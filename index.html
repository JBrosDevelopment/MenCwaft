<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MenCwaft</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background-image: url('Textures/bg.png');
        background-repeat: no-repeat;
        background-size: cover;
        font-family: 'Press Start 2P', monospace;
        color: white;
        text-shadow: 3px 3px #000;
        user-select: none;
    }

    h1 {
        font-size: 48px;
        margin-bottom: 60px;
    }

    .menu-button {
        width: 320px;
        padding: 20px;
        margin: 12px;
        font-size: 18px;
        background: #4c7f4c;
        border: 4px solid #2e4d2e;
        cursor: pointer;
        color: white;
        text-shadow: 2px 2px #000;
        transition: 0.15s;
    }

    .menu-button:hover {
        background: #6aa96a;
        transform: scale(1.03);
    }

    /* Modal background */
    #modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        display: none;
        justify-content: center;
        align-items: center;
    }

    /* Modal window */
    #modal-window {
        width: 500px;
        background: #2e2e2e;
        border: 5px solid #000;
        padding: 20px;
        color: white;
        text-shadow: 2px 2px #000;
    }

    iframe {
        width: 100%;
        height: 320px;
        border: none;
    }

    #close-btn {
        margin-top: 15px;
        width: 100%;
        padding: 15px;
        background: #7a2e2e;
        border: 4px solid #4a1a1a;
        color: white;
        cursor: pointer;
        font-family: 'Press Start 2P';
    }

    #close-btn:hover {
        background: #a33b3b;
    }
</style>
</head>
<body>

<h1>MenCwaft</h1>

<button class="menu-button" onclick="openJoin()">Join Server</button>
<button class="menu-button" onclick="startServer()">Start Server</button>
<button class="menu-button" onclick="window.location.href = 'game.html'">Play Locally (FOR TESTING)</button>

<!-- Modal -->
<div id="modal-bg">
    <div id="modal-window">
        <iframe id="modal-frame"></iframe>
        <button id="close-btn" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    function openJoin() {
        document.getElementById("modal-frame").src = "join.html";
        document.getElementById("modal-bg").style.display = "flex";
    }
    
    function startServer() {
        document.getElementById("modal-frame").src = "startServer.html";
        document.getElementById("modal-bg").style.display = "flex";
    }
    
    function closeModal() {
        document.getElementById("modal-bg").style.display = "none";
        document.getElementById("modal-frame").src = "";
    }
</script>    

</body>
</html>
