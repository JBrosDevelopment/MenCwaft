<style>
#crosshair {
    position: fixed;

    width: 18px;
    height: 18px;

    z-index: 1000;
    pointer-events: none;

    filter: drop-shadow(0 0 2px black);
}

#crosshair::before,
#crosshair::after {
    content: "";

    position: absolute;
    background: white;
}

#crosshair::before {
    left: 8px;
    top: 0;
    width: 2px;
    height: 18px;
}

#crosshair::after {
    left: 0;
    top: 8px;
    width: 18px;
    height: 2px;
}
</style>
<body>
    <div id="crosshair"></div>
</body>
