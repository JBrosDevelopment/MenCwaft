<head>
    <script src="client.js" type="module"></script>
    <script src="networking/client.js" type="module"></script>
</head>
<body>
    <title>Client</title>
    <div>
        <input id="server_id" type="text" placeholder="Server ID">
        <input id="username_input" type="text" placeholder="Username">
        <button id="connect_btn" type="button" id="start">Connect</button>
        <button id="disconnect_btn" disabled type="button" id="start">Disconnect</button>
    </div>
    <div>
        <input id="input" type="text" placeholder="Message">
        <button id="send_btn" disabled type="button" id="send">Send Message</button>
    </div>
    <div>
        <textarea id="recieved" id="log" cols="85" rows="22" readonly placeholder="Recieved"></textarea>
    </div>
</body>
