<head>
    <script src="server.js" type="module"></script>
    <script src="networking/server.js" type="module"></script>
</head>
<body>
    <title>Server</title>
    <div>
        <input id="server_id" type="text" placeholder="Server ID">
        <button id="start_btn" type="button" id="start">Start Server</button>
        <button id="stop_btn" disabled type="button" id="stop">Stop Server</button>
    </div>
    <div>
        <input id="message_input" type="text" placeholder="Message">
        <button id="send_btn" disabled type="button" id="send">Send Message</button>
    </div>
    <div>
        <textarea id="recieved" id="log" cols="85" rows="22" readonly placeholder="Recieved"></textarea>
    </div>
</body>
