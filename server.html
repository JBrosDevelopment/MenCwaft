<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="./src/server.js" type="module"></script>
<title>MenCwaft Server Console</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    height: 100vh;
    font-family: "Courier New", monospace;
    background: linear-gradient(
        to bottom,
        #6f4e37 0%,
        #5c4033 35%,
        #3f2a1d 100%
    );
    color: white;
    overflow: hidden;
}

.container {
    display: flex;
    height: 100vh;
    padding: 20px;
    gap: 20px;
}

/* Main Section */
.main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Console */
.console {
    flex: 1;
    background: rgba(0,0,0,0.75);
    border: 4px solid #9e7c4d;
    border-radius: 8px;
    padding: 12px;
    overflow-y: auto;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
}

.console-line {
    color: #7CFC00;
    margin-bottom: 4px;
}

/* Command Bar */
.command-bar {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.command-input {
    flex: 1;
    padding: 10px;
    font-size: 16px;
    background: #222;
    color: white;
    border: 2px solid #9e7c4d;
    border-radius: 4px;
}

.player-select {
    width: 180px;
    background: #222;
    color: white;
    border: 2px solid #9e7c4d;
    border-radius: 4px;
    padding: 10px;
}

.send-btn {
    width: 120px;
    background: #4CAF50;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
}

.send-btn:hover {
    background: #5ecf62;
}

.stop-btn {
    width: 100%;
    background: #f44336;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    margin-bottom: 10px;
    padding: 5px;
}

.stop-btn:hover {
    background: #f66b5e;
}

.start-btn {
    width: 100%;
    background: #4CAF50;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    margin-bottom: 10px;
    padding: 5px;
}

.start-btn:hover {
    background: #5ecf62;
}

.start-btn:disabled,
.stop-btn:disabled,
.send-btn:disabled {
    background: #555;
    cursor: not-allowed;
}

/* Information Panel */
.info-panel {
    width: 300px;
    background: rgba(0,0,0,0.75);
    border: 4px solid #9e7c4d;
    border-radius: 8px;
    padding: 15px;
}

.info-panel h2 {
    text-align: center;
    margin-bottom: 15px;
    color: #FFD700;
}

.info-item {
    margin-bottom: 12px;
    padding: 8px;
    background: rgba(255,255,255,0.05);
    border-left: 4px solid #4CAF50;
}

.label {
    color: #aaa;
    display: block;
    font-size: 13px;
}

.value {
    font-size: 16px;
    font-weight: bold;
}

.player-list {
    margin-top: 15px;
}

.player {
    padding: 6px;
    background: rgba(255,255,255,0.08);
    margin-bottom: 5px;
    border-radius: 4px;
}
</style>
</head>
<body>

<div class="container">

    <div class="main-panel">

        <div class="console" id="consoleContainer">
        </div>

        <div class="command-bar">
            <input type="text" class="command-input" id="commandInput" placeholder="Enter command..." disabled>

            <select class="player-select" id="playerSelect">
                <option value="all">All Players</option>
            </select>

            <button class="send-btn" id="sendBtn" disabled>Send</button>
        </div>

    </div>

    <div class="info-panel">
        <h2>Server Info</h2>
        
        <button class="start-btn" id="startBtn">Start Server</button>
        <button class="stop-btn" id="stopBtn" disabled>Stop Server</button>

        <div class="info-item">
            <span class="label">Server Name</span>
            <span class="value" id="serverName">XXX</span>
        </div>

        <div class="info-item">
            <span class="label">Seed</span>
            <span class="value" id="seedValue">0</span>
        </div>

        <div class="info-item">
            <span class="label">Players Online</span>
            <span class="value" id="playersOnline">0</span>
        </div>

        <div class="player-list" id="playerList">
            <h3>Players</h3>
        </div>
    </div>

</div>
</body>
</html>
