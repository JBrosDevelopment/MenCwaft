<head>    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="src/input_manager.js" type="module"></script>
    <script src="src/settings.js" type="module"></script>
    <script src="src/block_manager.js" type="module"></script>
    <script src="src/atmosphere.js" type="module"></script>
    <script src="src/player_manager.js" type="module"></script>
    <script src="src/block_outline.js" type="module"></script>
    <script src="src/boime_manager.js" type="module"></script>
    <script src="src/game.js" type="module"></script>
    <script src="src/client.js" type="module"></script>
    <title>MenCwaft - The Game</title>
</head>
<style>
#crosshair {
    position: fixed;

    width: 18px;
    height: 18px;

    z-index: 1000;
    pointer-events: none;

    filter: drop-shadow(0 0 2px black);
}

#crosshair::before,
#crosshair::after {
    content: "";

    position: absolute;
    background: white;
}

#crosshair::before {
    left: 8px;
    top: 0;
    width: 2px;
    height: 18px;
}

#crosshair::after {
    left: 0;
    top: 8px;
    width: 18px;
    height: 2px;
}
#hotbar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);

    display: flex;
    gap: 6px;

    padding: 8px;
    background: rgba(20, 20, 20, 0.45);
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 6px;

    z-index: 999;
}

.hotbar-slot {
    width: 48px;
    height: 48px;

    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 4px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 18px;
    color: white;
    user-select: none;
}

.hotbar-slot.selected {
    border-color: white;
    background: rgba(255, 255, 255, 0.15);
    border: 4px solid white;
    padding: 1px;
}

#chatContainer {
    position: fixed;
    left: 20px;
    top: 20px;

    width: 500px;
    height: 260px;

    display: flex;
    flex-direction: column;

    z-index: 2000;

    background: rgba(0, 0, 0, 0.55);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 6px;

    backdrop-filter: blur(3px);

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
}

#chatContainer.visible {
    opacity: 1;
    visibility: visible;
}

#chatInputContainer {
    position: fixed;
    left: 20px;
    bottom: 120px;

    width: 500px;

    display: none;
    flex-direction: column;

    z-index: 2000;
}

#chatInputContainer.open {
    display: flex;
}

#chatConsole {
    flex: 1;

    overflow-y: auto;

    padding: 10px;

    color: white;
    font-family: monospace;
    font-size: 15px;
}

.console-line {
    margin-bottom: 4px;
    text-shadow: 2px 2px 2px black;
}

#chatInput {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.15);

    background: rgba(0,0,0,.6);

    color: white;

    font-size: 16px;

    padding: 10px;
    outline: none;
}

#chatInput::placeholder {
    color: #bbb;
}

#loadingScreen {
    position: fixed;
    inset: 0;

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 99999;

    background:
        linear-gradient(rgba(0,0,0,.35), rgba(0,0,0,.35)),
        repeating-linear-gradient(
            45deg,
            #6a4b2d 0px,
            #6a4b2d 30px,
            #5c4025 30px,
            #5c4025 60px
        );
}

#loadingScreen.hidden {
    display: none;
}

.loading-panel {

    width: 520px;

    background: rgba(30,30,30,.92);

    border: 4px solid #8b6b43;
    border-radius: 8px;

    padding: 30px;

    color: white;
    text-align: center;

    font-family: "Trebuchet MS", sans-serif;

    box-shadow: 0 0 30px rgba(0,0,0,.6);
}

.loading-panel h1 {

    margin: 0 0 20px;

    color: #7CFC00;

    font-size: 32px;

    text-shadow: 2px 2px 3px black;
}

.loading-text {

    font-size: 20px;

    margin-bottom: 30px;
}

.loading-info {

    display: flex;

    justify-content: space-between;

    text-align: left;

    margin-bottom: 30px;
}

.loading-info div {

    width: 48%;

    background: rgba(255,255,255,.05);

    padding: 12px;

    border-left: 4px solid #4CAF50;
}

.loading-info .label {

    display: block;

    color: #aaa;

    font-size: 13px;

    margin-bottom: 5px;
}

.loading-bar {

    width: 100%;
    height: 22px;

    background: #222;

    border: 2px solid #777;

    overflow: hidden;

    margin-bottom: 20px;
}

.loading-bar-fill {

    height: 100%;
    width: 35%;

    background:
        repeating-linear-gradient(
            90deg,
            #5bc236 0px,
            #5bc236 10px,
            #69d843 10px,
            #69d843 20px
        );

    animation: loadingBar 1.2s linear infinite;
}

.loading-tip {

    color: #ccc;

    font-style: italic;
}

.dots::after {

    content: "";

    animation: dots 1.4s infinite;
}

@keyframes dots {

    0%   { content: ""; }

    25%  { content: "."; }

    50%  { content: ".."; }

    75%  { content: "..."; }

    100% { content: ""; }
}

@keyframes loadingBar {

    from {
        transform: translateX(-100%);
    }

    to {
        transform: translateX(300%);
    }
}

#loadingBarContainer {
    display: none;
    flex-direction: column;
}

#loadingBarContainer.visible {
    display: flex;
}



</style>
<body>
    <div id="loadingScreen">

        <div class="loading-panel">
    
            <h1>Connecting to Server</h1>
    
            <div class="loading-text">
                <span id="loadingText">Waiting to connect</span><span class="dots"></span>
            </div>
    
            <div class="loading-info">
                <div>
                    <span class="label">Server</span>
                    <span id="loadingServerName"></span>
                </div>
    
                <div>
                    <span class="label">Player</span>
                    <span id="loadingPlayerName"></span>
                </div>
            </div>
    
            <div id="loadingBarContainer">
                <div class="loading-bar">
                    <div class="loading-bar-fill"></div>
                </div>
        
            </div>
            <div class="loading-tip">
                <span id="loadingTip"></span>
            </div>
        </div>
    
    </div>
    <div id="crosshair"></div>
    <div id="hotbar"></div>

    <div id="chatContainer">
        <div id="chatConsole"></div>
    </div>
    <div id="chatInputContainer">
        <input id="chatInput" type="text" placeholder="Type a message..." autocomplete="off">
    </div>
    
</body>
<canvas id="c"></canvas>
